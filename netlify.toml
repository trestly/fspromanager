# Plain static site (no build step). Netlify serves the repo root as-is.
# Clean URLs (/lenders, /guides/<slug>) come from the folder/index.html layout.
[build]
  publish = "."

# --- Safety 301s -------------------------------------------------------------
# Paths that exist on the OLD aliased site (fivestaraccounting.com build) but
# will NOT exist on this new site. Point them at the homepage so the domain
# switch can never 404 a visitor or a stray inbound link. None of these are
# indexed under marylandbizbookkeeper.com; remove any you don't want.
[[redirects]]
  from = "/services"
  to = "/"
  status = 301
[[redirects]]
  from = "/services/*"
  to = "/"
  status = 301
[[redirects]]
  from = "/about"
  to = "/"
  status = 301
[[redirects]]
  from = "/contact"
  to = "/"
  status = 301
[[redirects]]
  from = "/resources"
  to = "/"
  status = 301
[[redirects]]
  from = "/privacy-policy"
  to = "/"
  status = 301
[[redirects]]
  from = "/terms-of-service"
  to = "/"
  status = 301
